# Stack: Kafka (KRaft), Spark, Flink, Airflow, DataHub
#
# Usage:
#   docker compose up -d postgres kafka
#   docker compose up -d spark-master spark-worker flink-jobmanager flink-taskmanager
#   docker compose up -d airflow-init && docker compose up -d airflow-webserver airflow-scheduler
#   docker compose up -d elasticsearch datahub-gms datahub-frontend

name: media-pipeline

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    PYTHONPATH: /opt/airflow/src
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs/airflow:/opt/airflow/logs
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./config:/opt/airflow/config
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - media-net

services:

  # ── Postgres (Airflow backend) ───────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: media-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    networks:
      - media-net

  # ── Kafka (KRaft mod) ───────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:latest
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_KRAFT_MODE: "true"  # This enables KRaft mode in Kafka
      KAFKA_PROCESS_ROLES: controller,broker  # Kafka acts as both broker and controller
      KAFKA_NODE_ID: 1  # A unique ID for this Kafka instance
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"  # Defines the controller voters
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LOG_DIRS: /var/lib/kafka/data  # Where Kafka stores its logs
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"  # Kafka will automatically create topics if needed
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1  # Since we’re running one broker, one replica is enough
      CLUSTER_ID: "Mk3OEYBSD34fcwNTJENDM2Qk"  # A unique ID for the Kafka cluster
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - media-net

  # ── Spark ────────────────────────────────────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.5
    hostname: spark-master
    container_name: spark-master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      # Delta Lake + Kafka connector
      SPARK_EXTRA_CLASSPATH: /opt/bitnami/spark/jars/delta-core.jar
    ports:
      - "8080:8080"   # Spark UI
      - "7077:7077"   # Spark master
    volumes:
      - ./data:/opt/spark/data
      - ./src:/opt/spark/src
      - ./config:/opt/spark/config
      - spark-jars:/opt/bitnami/spark/jars/extra
    networks:
      - media-net

  spark-worker:
    image: bitnami/spark:3.5
    hostname: spark-worker
    container_name: spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    depends_on:
      - spark-master
    volumes:
      - ./data:/opt/spark/data
      - ./src:/opt/spark/src
      - spark-jars:/opt/bitnami/spark/jars/extra
    networks:
      - media-net

  # ── Flink ────────────────────────────────────────────────────────────────────
  flink-jobmanager:
    image: flink:1.18-scala_2.12
    hostname: flink-jobmanager
    container_name: flink-jobmanager
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 1
        state.backend: filesystem
        state.checkpoints.dir: file:///opt/flink/checkpoints
    ports:
      - "8081:8081"   # Flink UI
    volumes:
      - ./data:/opt/flink/data
      - ./src:/opt/flink/src
      - flink-checkpoints:/opt/flink/checkpoints
    networks:
      - media-net

  flink-taskmanager:
    image: flink:1.18-scala_2.12
    hostname: flink-taskmanager
    container_name: flink-taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        taskmanager.memory.process.size: 1728m
    depends_on:
      - flink-jobmanager
    volumes:
      - ./data:/opt/flink/data
      - flink-checkpoints:/opt/flink/checkpoints
    networks:
      - media-net

  # ── Airflow ──────────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    hostname: airflow-webserver
    command: webserver
    ports:
      - "8082:8080"   # Airflow UI
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Elasticsearch (DataHub backend) ─────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:7.10.1
    container_name: elasticsearch
    hostname: elasticsearch
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - media-net

  # ── DataHub ──────────────────────────────────────────────────────────────────
  datahub-gms:
    image: linkedin/datahub-gms:v0.13.1
    container_name: datahub-gms
    hostname: datahub-gms
    environment:
      EBEAN_DATASOURCE_USERNAME: airflow
      EBEAN_DATASOURCE_PASSWORD: airflow
      EBEAN_DATASOURCE_HOST: postgres:5432
      EBEAN_DATASOURCE_URL: jdbc:postgresql://postgres:5432/datahub
      EBEAN_DATASOURCE_DRIVER: org.postgresql.Driver
      KAFKA_BOOTSTRAP_SERVER: kafka:9092
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: "9200"
      JAVA_OPTS: "-Xms512m -Xmx512m"
      ENTITY_SERVICE_ENABLE_RETENTION: "true"
    ports:
      - "8083:8080"   # DataHub GMS API
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - media-net

  datahub-frontend:
    image: linkedin/datahub-frontend-react:v0.13.1
    container_name: datahub-frontend
    hostname: datahub-frontend
    environment:
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: "8080"
      DATAHUB_SECRET: "YouKnowNothing"
      DATAHUB_APP_VERSION: "1.0"
      DATAHUB_PLAY_MEM_BUFFER_SIZE: "10MB"
    ports:
      - "9002:9002"   # DataHub UI
    depends_on:
      - datahub-gms
    networks:
      - media-net

# ── Networks ────────────────────────────────────────────────────────────────────
networks:
  media-net:
    driver: bridge

# ── Volumes ─────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  kafka-data:
  elasticsearch-data:
  spark-jars:
  flink-checkpoints: